<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skins Gallery</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Skinview3D -->
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.4.1/bundles/skinview3d.bundle.js"></script>
    <!-- Skins Data -->
    <script src="skins.js"></script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1f2937;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        .sidebar-item {
            transition: all 0.2s;
        }

        .sidebar-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .sidebar-item.active {
            background-color: rgba(59, 130, 246, 0.2);
            border-left: 3px solid #3b82f6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.5rem;
        }

        .checker-bg {
            background-color: #1f2937;
            background-image: linear-gradient(45deg, #111827 25%, transparent 25%, transparent 75%, #111827 75%, #111827),
                linear-gradient(45deg, #111827 25%, transparent 25%, transparent 75%, #111827 75%, #111827);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .image-container {
            aspect-ratio: 1/1;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .file-item:hover .image-container img {
            transform: scale(1.1);
        }

        .image-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.25rem;
            height: 2.5rem;
        }

        /* 3D Viewer overlay styles */
        .viewer-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .viewer-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .viewer-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .viewer-nav:hover {
            background: rgba(59, 130, 246, 0.6);
            transform: translateY(-50%) scale(1.1);
        }

        .viewer-nav:active {
            transform: translateY(-50%) scale(0.95);
        }

        .viewer-prev {
            left: 2rem;
        }

        .viewer-next {
            right: 2rem;
        }

        .viewer-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .viewer-close:hover {
            background: rgba(239, 68, 68, 0.8);
            transform: scale(1.1);
        }

        /* Viewer dimensions */
        .viewer-display-area {
            width: 320px;
            height: 360px;
        }

        #viewer-img-2d {
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
            object-fit: contain;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen font-sans antialiased">
    <!-- Main App Container -->
    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <aside class="w-72 bg-gray-800 flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.5)] z-10">
            <div class="p-5 border-b border-gray-700 flex justify-between items-center bg-gray-800/80 backdrop-blur-sm">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg shadow-lg">
                        <i class="fas fa-tshirt text-white text-lg"></i>
                    </div>
                    <h1
                        class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                        Skin Gallery</h1>
                </div>
                <button id="switch-language"
                    class="bg-gray-700 hover:bg-gray-600 rounded-lg px-3 py-1.5 flex items-center justify-center transition-colors shadow"
                    title="Change Language">
                    <span class="text-xs font-bold tracking-wider" id="lang-indicator">UK</span>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto w-full">
                <!-- 'All categories' item is placed here statically initially -->
                <nav id="category-list" class="p-3 space-y-1 font-medium text-sm">
                    <!-- Categories will be rendered here -->
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden relative bg-gray-900">
            <!-- Toolbar -->
            <header
                class="bg-gray-800/80 backdrop-blur-md p-4 border-b border-gray-700 flex items-center justify-between shadow-md z-10 sticky top-0">
                <div class="flex items-center gap-3">
                    <button id="back-btn"
                        class="text-gray-400 hover:text-white transition-colors bg-gray-700 p-2 rounded-full hidden">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h2 id="current-category" class="text-xl font-semibold text-gray-100 tracking-wide"
                        data-i18n="all_images">Всі зображення</h2>
                </div>
                <div
                    class="text-sm text-gray-400 font-medium bg-gray-800 px-3 py-1 rounded-full border border-gray-700">
                    <i class="fas fa-image mr-1"></i>
                    <span id="skin-count">0</span>
                </div>
            </header>

            <!-- File Browser Grid -->
            <div id="file-browser" class="flex-1 overflow-y-auto p-6 lg:p-8 image-grid">
                <!-- Skins will be displayed here -->
            </div>

            <!-- Empty State -->
            <div id="empty-state"
                class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none hidden text-gray-500">
                <div
                    class="bg-gray-800/50 p-8 rounded-2xl flex flex-col items-center backdrop-blur-sm border border-gray-700">
                    <i class="fas fa-ghost text-6xl mb-4 text-gray-600"></i>
                    <p class="text-lg font-medium" data-i18n="no_images">Немає зображень у цій категорії</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Viewer Overlay -->
    <div id="viewer-overlay" class="viewer-overlay">
        <!-- Overlay background elements -->
        <button class="viewer-close" id="viewer-close" title="Close"><i class="fas fa-times"></i></button>
        <button class="viewer-nav viewer-prev" id="viewer-prev"><i class="fas fa-chevron-left"></i></button>
        <button class="viewer-nav viewer-next" id="viewer-next"><i class="fas fa-chevron-right"></i></button>

        <div class="bg-gray-800 rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-700 transform transition-transform scale-95"
            id="viewer-card" style="width: 400px; max-width: 90vw;">
            <!-- Viewer Header -->
            <div
                class="px-6 py-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/80 z-10 shadow-sm">
                <h3 id="viewer-title" class="text-base font-bold truncate pr-4 text-gray-100" style="max-width: 220px;">
                    Skin Name.png</h3>

                <!-- 2D / 3D Toggle -->
                <div class="flex bg-gray-900 rounded-lg p-1 border border-gray-700 shadow-inner">
                    <button id="mode-2d"
                        class="px-3 py-1 text-xs font-bold tracking-wider rounded-md transition-all text-white bg-blue-600 shadow-md">2D</button>
                    <button id="mode-3d"
                        class="px-3 py-1 text-xs font-bold tracking-wider rounded-md transition-all text-gray-400 hover:text-white">3D</button>
                </div>
            </div>

            <!-- Display Area -->
            <div class="relative flex justify-center items-center bg-gray-900 checker-bg shadow-inner py-6">
                <!-- 2D View -->
                <div id="viewer-container-2d" class="viewer-display-area flex justify-center items-center">
                    <img id="viewer-img-2d" src="" alt="Skin Preview" class="drop-shadow-lg">
                </div>

                <!-- 3D View -->
                <div id="viewer-container-3d" class="viewer-display-area hidden">
                    <canvas id="skin_canvas"></canvas>
                </div>
            </div>

            <!-- Footer Controls -->
            <div class="px-5 py-4 border-t border-gray-700 bg-gray-800/80 flex flex-col items-center gap-3">
                <!-- 3D Controls -->
                <div id="controls-3d" class="hidden flex flex-wrap justify-center gap-2 w-full">
                    <button
                        class="anim-btn px-3 py-1.5 rounded bg-gray-700 hover:bg-gray-600 text-xs font-semibold text-gray-200 transition-colors border border-gray-600 hover:border-blue-500 shadow-sm"
                        data-anim="idle">Idle</button>
                    <button
                        class="anim-btn px-3 py-1.5 rounded bg-gray-700 hover:bg-gray-600 text-xs font-semibold text-gray-200 transition-colors border border-gray-600 hover:border-blue-500 shadow-sm"
                        data-anim="walk">Walk</button>
                    <button
                        class="anim-btn px-3 py-1.5 rounded bg-gray-700 hover:bg-gray-600 text-xs font-semibold text-gray-200 transition-colors border border-gray-600 hover:border-blue-500 shadow-sm"
                        data-anim="run">Run</button>
                    <button
                        class="anim-btn px-3 py-1.5 rounded bg-gray-700 hover:bg-gray-600 text-xs font-semibold text-gray-200 transition-colors border border-gray-600 hover:border-blue-500 shadow-sm"
                        data-anim="fly">Fly</button>
                </div>

                <!-- Common Actions -->
                <div class="flex w-full justify-center gap-3">
                    <a id="viewer-download" href="#" download
                        class="flex-1 py-2.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-semibold text-white transition-colors flex items-center justify-center border border-gray-600 shadow-sm">
                        <i class="fas fa-download mr-2"></i> <span data-i18n="download">Download</span>
                    </a>
                    <button id="viewer-copy-url"
                        class="flex-1 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-sm font-semibold text-white transition-colors flex items-center justify-center shadow-md">
                        <i class="fas fa-link mr-2"></i> <span data-i18n="copy_link">Копіювати URL</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Language Selection Modal -->
    <div id="language-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center hidden z-50 transition-opacity">
        <div class="bg-gray-800 rounded-2xl p-8 w-80 shadow-2xl border border-gray-700">
            <h3 class="text-xl font-bold mb-6 text-center text-white" data-i18n="select_language">Оберіть мову</h3>
            <div class="flex flex-col gap-3">
                <button
                    class="lang-option p-4 rounded-xl bg-gray-700 hover:bg-gray-600 hover:bg-blue-600 hover:text-white text-left flex justify-between items-center transition-all group border border-gray-600"
                    data-lang="uk">
                    <span class="font-medium">Українська</span> <span
                        class="text-xl group-hover:scale-110 transition-transform">🇺🇦</span>
                </button>
                <button
                    class="lang-option p-4 rounded-xl bg-gray-700 hover:bg-gray-600 hover:bg-blue-600 hover:text-white text-left flex justify-between items-center transition-all group border border-gray-600"
                    data-lang="en">
                    <span class="font-medium">English</span> <span
                        class="text-xl group-hover:scale-110 transition-transform">🇺🇸</span>
                </button>
                <button
                    class="lang-option p-4 rounded-xl bg-gray-700 hover:bg-gray-600 hover:bg-blue-600 hover:text-white text-left flex justify-between items-center transition-all group border border-gray-600"
                    data-lang="ru">
                    <span class="font-medium">Русский</span> <span
                        class="text-xl group-hover:scale-110 transition-transform">🏳️</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification-container" class="fixed bottom-6 right-6 flex flex-col gap-2 z-50 pointer-events-none"></div>

    <script>
        // --- Translations ---
        const translations = {
            uk: {
                select_language: "Оберіть мову",
                all_images: "Всі зображення",
                no_images: "Немає зображень у цій категорії",
                copy_link: "Копіювати URL",
                link_copied: "Посилання скопійовано!",
                download: "Завантажити"
            },
            en: {
                select_language: "Select Language",
                all_images: "All Images",
                no_images: "No images in this category",
                copy_link: "Copy URL",
                link_copied: "Link copied!",
                download: "Download"
            },
            ru: {
                select_language: "Выберите язык",
                all_images: "Все изображения",
                no_images: "Нет изображений в этой категории",
                copy_link: "Копировать URL",
                link_copied: "Ссылка скопирована!",
                download: "Скачать"
            }
        };

        // --- App State ---
        const state = {
            language: localStorage.getItem('language') || 'uk',
            skinsTree: null,
            currentPath: [],
            currentFiles: [], // Array of rendered files for prev/next
            currentViewIndex: -1,
            viewMode: '2d' // '2d' or '3d'
        };

        // --- DOM Elements ---
        const els = {
            langModal: document.getElementById('language-modal'),
            langIndicator: document.getElementById('lang-indicator'),
            categoryList: document.getElementById('category-list'),
            fileBrowser: document.getElementById('file-browser'),
            emptyState: document.getElementById('empty-state'),
            currentCategory: document.getElementById('current-category'),
            skinCount: document.getElementById('skin-count'),
            backBtn: document.getElementById('back-btn'),

            // Viewer
            viewerOverlay: document.getElementById('viewer-overlay'),
            viewerCard: document.getElementById('viewer-card'),
            viewerClose: document.getElementById('viewer-close'),
            viewerPrev: document.getElementById('viewer-prev'),
            viewerNext: document.getElementById('viewer-next'),
            viewerTitle: document.getElementById('viewer-title'),
            viewerDownload: document.getElementById('viewer-download'),
            viewerCopyUrl: document.getElementById('viewer-copy-url'),

            // 2D/3D Mode toggles
            mode2d: document.getElementById('mode-2d'),
            mode3d: document.getElementById('mode-3d'),
            container2d: document.getElementById('viewer-container-2d'),
            container3d: document.getElementById('viewer-container-3d'),
            img2d: document.getElementById('viewer-img-2d'),
            controls3d: document.getElementById('controls-3d')
        };

        // --- Variables ---
        const CATEGORY_ROOT = 'skins';
        let skinViewer = null;

        // --- Init ---
        async function init() {
            setupEvents();
            applyLanguage();

            // Show config modal if language is not set yet
            if (!localStorage.getItem('language')) {
                els.langModal.classList.remove('hidden');
            }

            try {
                if (typeof window.skinsData !== 'undefined') {
                    state.skinsTree = { name: 'root', ...window.skinsData };
                    renderCategorySidebar();
                    renderGallery();
                } else {
                    console.error("skinsData not found. Did you run refresh_skinslist.bat?");
                    showNotification("Помилка: skins.js не знайдено", "error");
                }
            } catch (e) {
                console.error("Failed to initialize skins data", e);
                showNotification("Помилка завантаження бази скінів", "error");
            }
        }

        // --- Setup Events ---
        function setupEvents() {
            // Language selection
            document.getElementById('switch-language').onclick = () => els.langModal.classList.remove('hidden');

            document.querySelectorAll('.lang-option').forEach(btn => {
                btn.onclick = () => {
                    state.language = btn.getAttribute('data-lang');
                    localStorage.setItem('language', state.language);
                    els.langModal.classList.add('hidden');
                    applyLanguage();
                    renderCategorySidebar();
                    renderGallery();
                };
            });

            // Navigation
            els.backBtn.onclick = () => {
                state.currentPath.pop(); // Go up one level
                renderGallery();
                highlightCategory();
            };

            // Overlay closes
            els.viewerClose.onclick = closeViewer;
            els.viewerOverlay.onclick = (e) => {
                if (e.target === els.viewerOverlay) closeViewer();
            };
            document.addEventListener('keydown', (e) => {
                if (!els.viewerOverlay.classList.contains('active')) return;
                if (e.key === 'Escape') closeViewer();
                if (e.key === 'ArrowLeft') showPrevSkin();
                if (e.key === 'ArrowRight') showNextSkin();
            });

            // Prev/Next buttons
            els.viewerPrev.onclick = () => showPrevSkin();
            els.viewerNext.onclick = () => showNextSkin();

            // 2D/3D Toggles
            els.mode2d.onclick = () => setViewerMode('2d');
            els.mode3d.onclick = () => setViewerMode('3d');

            // 3D Animation Controls
            document.querySelectorAll('.anim-btn').forEach(btn => {
                btn.onclick = () => {
                    const anim = btn.getAttribute('data-anim');
                    setSkinViewerAnimation(anim);

                    // Style update
                    document.querySelectorAll('.anim-btn').forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white', 'border-blue-500');
                        b.classList.add('bg-gray-700');
                    });
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-500');
                    btn.classList.remove('bg-gray-700');
                };
            });
        }

        function translate(key) { return translations[state.language]?.[key] || key; }

        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[state.language]?.[key]) {
                    el.textContent = translations[state.language][key];
                }
            });
            els.langIndicator.textContent = state.language.toUpperCase();
        }

        // --- Sidebar logic ---
        function buildCategoryTree(node, path = []) {
            const ul = document.createElement('ul');
            // If not root, indent
            if (path.length > 0) ul.className = 'ml-4 mt-1 border-l border-gray-700 pl-2 space-y-1 block';

            const isRoot = path.length === 0;
            const li = document.createElement('li');

            li.className = 'sidebar-item flex items-center p-2.5 rounded-lg cursor-pointer text-gray-300 transition-colors group';
            li.innerHTML = `
                <i class="fas ${isRoot ? 'fa-images text-blue-400' : 'fa-folder text-yellow-500'} mr-3 group-hover:scale-110 transition-transform"></i>
                <span class="truncate pr-2">${isRoot ? translate('all_images') : node.name}</span>
            `;

            li.onclick = (e) => {
                e.stopPropagation(); // Prevent parent clicks
                state.currentPath = [...path];
                renderGallery();
                highlightCategory();
            };
            li.id = 'cat-' + (path.join('/') || 'root');

            // Prepend self wrapper
            const wrapper = document.createElement('div');
            wrapper.appendChild(li);

            // Append children beneath
            if (node.categories && node.categories.length > 0) {
                node.categories.forEach(cat => {
                    wrapper.appendChild(buildCategoryTree(cat, [...path, cat.name]));
                });
            }
            ul.appendChild(wrapper);
            return ul;
        }

        function renderCategorySidebar() {
            els.categoryList.innerHTML = '';
            if (state.skinsTree) {
                els.categoryList.appendChild(buildCategoryTree(state.skinsTree, []));
                highlightCategory();
            }
        }

        function highlightCategory() {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active', 'text-white', 'bg-blue-600/10'));
            const id = 'cat-' + (state.currentPath.join('/') || 'root');
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('active', 'text-white', 'bg-blue-600/10');
            }
        }

        // --- Tree Traversal & Gathering ---
        function getNodeByPath(node, path) {
            if (path.length === 0) return node;
            const [head, ...rest] = path;
            const child = node.categories?.find(c => c.name === head);
            if (!child) return node;
            return getNodeByPath(child, rest);
        }

        function collectFiles(node, basePath) {
            let files = [];
            if (node.files) {
                // Now node.files contains objects {name: "foo", data: "data:image/base64..."}
                files = files.concat(node.files.map(f => ({
                    src: f.data,
                    name: f.name,
                    rawPath: `${basePath}/${f.name}`
                })));
            }
            if (node.categories) {
                node.categories.forEach(cat => {
                    files = files.concat(collectFiles(cat, `${basePath}/${cat.name}`));
                });
            }
            return files;
        }

        // --- Gallery Rendering ---
        function renderGallery() {
            els.fileBrowser.innerHTML = '';
            const node = getNodeByPath(state.skinsTree, state.currentPath);
            const basePath = CATEGORY_ROOT + (state.currentPath.length ? '/' + state.currentPath.join('/') : '');

            // Gather files
            const rawFiles = collectFiles(node, basePath);

            // Update UI Counters and Back Btn
            state.currentFiles = rawFiles;
            els.skinCount.textContent = rawFiles.length;
            els.currentCategory.textContent = state.currentPath.length > 0 ? state.currentPath[state.currentPath.length - 1] : translate('all_images');

            if (state.currentPath.length > 0) {
                els.backBtn.classList.remove('hidden');
            } else {
                els.backBtn.classList.add('hidden');
            }

            // Render empty state or items
            if (rawFiles.length === 0) {
                els.emptyState.classList.remove('hidden');
                return;
            }

            els.emptyState.classList.add('hidden');

            rawFiles.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'file-item bg-gray-800 rounded-xl p-3 shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300 fade-in border border-gray-700/50 cursor-pointer';
                div.style.animationDelay = `${(index % 15) * 0.05}s`; // Staggered fade in

                div.innerHTML = `
                    <div class="image-container rounded-lg mb-3 checker-bg border border-gray-700/50 shadow-inner group flex items-center justify-center p-2 relative">
                        <img src="${file.src}" alt="${file.name}" loading="lazy" class="max-w-[80%] max-h-[80%] drop-shadow-md">
                        <div class="absolute inset-0 bg-blue-600/0 group-hover:bg-blue-600/20 transition-colors pointer-events-none flex items-center justify-center opacity-0 group-hover:opacity-100">
                            <i class="fas fa-eye text-white text-3xl drop-shadow-lg"></i>
                        </div>
                    </div>
                    <div class="image-title text-center mb-1 text-sm font-medium text-gray-200" title="${file.name}">${file.name}</div>
                `;

                div.onclick = () => openViewer(index);

                els.fileBrowser.appendChild(div);
            });
        }

        // --- Viewer Actions ---
        function openViewer(index) {
            state.currentViewIndex = index;
            updateViewerContent();
            els.viewerOverlay.classList.add('active');
            els.viewerCard.classList.remove('scale-95');
            els.viewerCard.classList.add('scale-100');

            // Initialize 3D view if we are on 3D mode
            if (state.viewMode === '3d') {
                update3DViewer();
            }
        }

        function closeViewer() {
            els.viewerOverlay.classList.remove('active');
            els.viewerCard.classList.remove('scale-100');
            els.viewerCard.classList.add('scale-95');

            // optionally destroy or pause 3d viewer to save resources
            if (skinViewer) {
                skinViewer.animation = null; // stop anim
            }
        }

        function showPrevSkin() {
            if (state.currentFiles.length === 0) return;
            state.currentViewIndex = (state.currentViewIndex - 1 + state.currentFiles.length) % state.currentFiles.length;
            updateViewerContent();
        }

        function showNextSkin() {
            if (state.currentFiles.length === 0) return;
            state.currentViewIndex = (state.currentViewIndex + 1) % state.currentFiles.length;
            updateViewerContent();
        }

        function updateViewerContent() {
            const file = state.currentFiles[state.currentViewIndex];
            if (!file) return;

            els.viewerTitle.textContent = file.name;
            els.img2d.src = file.src;

            // Setup copy and download actions
            const encodeUrl = encodeURL(`${window.location.origin}/azubanskins/${file.rawPath}`);
            els.viewerCopyUrl.onclick = () => {
                copyToClipboard(encodeUrl);
                showNotification(translate('link_copied'));
            };

            els.viewerDownload.href = file.src; // Base64 natively downloads
            els.viewerDownload.download = file.name;

            // If 3D mode is active, load skin
            if (state.viewMode === '3d') {
                update3DViewer();
            }
        }

        function setViewerMode(mode) {
            state.viewMode = mode;

            // Toggle visual tabs
            if (mode === '2d') {
                els.mode2d.classList.replace('text-gray-400', 'text-white');
                els.mode2d.classList.add('bg-blue-600', 'shadow-md');
                els.mode3d.classList.replace('text-white', 'text-gray-400');
                els.mode3d.classList.remove('bg-blue-600', 'shadow-md');

                els.container2d.classList.remove('hidden');
                els.container3d.classList.add('hidden');
                els.controls3d.classList.add('hidden');

                // Suspend 3d engine if active
                if (skinViewer) {
                    skinViewer.animation = null;
                }
            } else {
                els.mode3d.classList.replace('text-gray-400', 'text-white');
                els.mode3d.classList.add('bg-blue-600', 'shadow-md');
                els.mode2d.classList.replace('text-white', 'text-gray-400');
                els.mode2d.classList.remove('bg-blue-600', 'shadow-md');

                els.container2d.classList.add('hidden');
                els.container3d.classList.remove('hidden');
                els.controls3d.classList.remove('hidden');

                update3DViewer();

                // Set initial active state for anim buttons
                const walkBtn = document.querySelector('.anim-btn[data-anim="walk"]');
                if (walkBtn) walkBtn.click();
            }
        }

        function update3DViewer() {
            const file = state.currentFiles[state.currentViewIndex];
            if (!file) return;

            // Lazy instantiate 3D viewer
            if (!skinViewer && typeof skinview3d !== 'undefined') {
                try {
                    skinViewer = new skinview3d.SkinViewer({
                        canvas: document.getElementById("skin_canvas"),
                        width: 320,
                        height: 360,
                        skin: file.src
                    });

                    // Add controls for orbiting
                    let control = skinview3d.createOrbitControls(skinViewer);
                    control.enableRotate = true;
                    control.enableZoom = true;
                    control.enablePan = false;

                    // Add auto rotation
                    skinViewer.animation = new skinview3d.WalkingAnimation();
                } catch (e) {
                    console.error("Failed to init skinview3d:", e);
                    showNotification("Помилка завантаження 3D перегляду", "error");
                    setViewerMode('2d');
                }
            } else if (skinViewer) {
                skinViewer.loadSkin(file.src).catch(e => console.error("Could not load 3D skin", e));
            }
        }

        function setSkinViewerAnimation(type) {
            if (!skinViewer) return;
            switch (type) {
                case 'walk':
                    skinViewer.animation = new skinview3d.WalkingAnimation();
                    skinViewer.animation.speed = 0.8;
                    break;
                case 'run':
                    skinViewer.animation = new skinview3d.RunningAnimation();
                    break;
                case 'fly':
                    skinViewer.animation = new skinview3d.FlyingAnimation();
                    break;
                case 'idle':
                default:
                    skinViewer.animation = null;
                    // Reset pose
                    skinViewer.playerObject.rotation.y = 0;
                    skinViewer.playerObject.skin.leftArm.rotation.x = 0;
                    skinViewer.playerObject.skin.rightArm.rotation.x = 0;
                    skinViewer.playerObject.skin.leftLeg.rotation.x = 0;
                    skinViewer.playerObject.skin.rightLeg.rotation.x = 0;
                    break;
            }
        }

        // --- Utils ---
        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed'; // Avoid scrolling to bottom
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        }

        function encodeURL(url) {
            try {
                const urlObj = new URL(url);
                const pathParts = urlObj.pathname.split('/').filter(Boolean);
                const encodedPath = pathParts.map(part => {
                    try {
                        decodeURIComponent(part);
                        return encodeURIComponent(part);
                    } catch (e) { return part; }
                }).join('/');
                return `${urlObj.origin}/${encodedPath}`;
            } catch (e) {
                return url;
            }
        }

        function showNotification(message, type = "success") {
            const wrap = document.getElementById('notification-container');
            const el = document.createElement('div');
            el.className = `bg-gray-800 border-l-4 ${type === 'error' ? 'border-red-500' : 'border-green-500'} px-4 py-3 rounded shadow-lg flex items-center gap-3 transform translate-y-full opacity-0 transition-all duration-300 pointer-events-auto`;
            el.innerHTML = `
                <i class="fas ${type === 'error' ? 'fa-exclamation-circle text-red-500' : 'fa-check-circle text-green-500'}"></i>
                <span class="text-sm font-medium text-white">${message}</span>
            `;

            wrap.appendChild(el);

            // Trigger animation
            requestAnimationFrame(() => {
                el.classList.remove('translate-y-full', 'opacity-0');
            });

            // Remove after 3s
            setTimeout(() => {
                el.classList.add('opacity-0', 'scale-95');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        // --- Start ---
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
